<div class="page">
  <header class="page-header">
    <h1>Manage employees</h1>
    <p>Invite team members to submit orders</p>
  </header>

  @if (invited()) {
    <div class="toast">Invite sent to {{ invited() }} (mock)</div>
  }

  <div class="card invite-card">
    <h3>Invite employee</h3>
    <form [formGroup]="inviteForm" (ngSubmit)="invite()" class="invite-row">
      <div class="form-field">
        <label>Name</label>
        <input formControlName="name" placeholder="Full name" />
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="email@company.com" />
      </div>
      <button type="submit" class="btn btn-primary">Send invite</button>
    </form>
  </div>

  <div class="card table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (e of employees; track e.id) {
          <tr>
            <td><strong>{{ e.name }}</strong></td>
            <td>{{ e.email }}</td>
            <td>{{ e.role }}</td>
            <td>
              <span
                class="badge"
                [class.badge-open]="e.status === 'Active'"
                [class.badge-invited]="e.status === 'Invited'"
                [class.badge-closed]="e.status === 'Inactive'"
              >
                {{ e.status }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
